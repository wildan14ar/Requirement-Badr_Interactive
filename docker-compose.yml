version: '3.8'

# ==============================================================================
# COMPLETE DATA PIPELINE STACK
# Components: Airflow + Kafka (KRaft) + Spark + ClickHouse + Superset
# ==============================================================================

# ==============================================================================
# REUSABLE CONFIG ANCHORS
# ==============================================================================

# Airflow common config
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # ClickHouse Connection
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_PORT: 9000
    CLICKHOUSE_DB: datamart_badr_interactive
    # Source MySQL Connection
    SOURCE_DB_HOST: host.docker.internal
    SOURCE_DB_PORT: 3306
    SOURCE_DB_NAME: recruitment_dev
    SOURCE_DB_USER: devel
    SOURCE_DB_PASS: recruitment2024
    # Kafka Connection
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/config:/opt/airflow/config
    - ./airflow/plugins:/opt/airflow/plugins
    - ./scripts:/opt/airflow/scripts
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - pipeline-net
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
    clickhouse:
      condition: service_healthy

# Kafka common config
x-kafka-common: &kafka-common
  image: confluentinc/cp-kafka:7.6.0
  networks:
    - pipeline-net
  restart: unless-stopped

# Spark common config
x-spark-common: &spark-common
  image: bitnami/spark:3.5
  networks:
    - pipeline-net
  restart: always
  volumes:
    - ./spark/jobs:/opt/spark/jobs
    - ./spark/data:/opt/spark/data

# ==============================================================================
# SERVICES
# ==============================================================================
services:
  # ============================================================================
  # AIRFLOW DEPENDENCIES
  # ============================================================================

  # PostgreSQL for Airflow metadata
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - pipeline-net

  # Redis for Airflow Celery & Superset cache
  redis:
    image: redis:7.2-bookworm
    container_name: redis-badr
    expose:
      - 6379
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always
    networks:
      - pipeline-net

  # ============================================================================
  # AIRFLOW COMPONENTS
  # ============================================================================

  # Airflow initialization
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config}
        echo "Airflow version:"
        /entrypoint airflow version
        echo "Creating directories..."
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"

  # Airflow Webserver
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common
      airflow-init:
        condition: service_completed_successfully

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common
      airflow-init:
        condition: service_completed_successfully

  # Airflow Worker (Celery)
  airflow-worker:
    <<: *airflow-common
    container_name: airflow-worker
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common
      airflow-init:
        condition: service_completed_successfully

  # ============================================================================
  # KAFKA — KRaft mode (no Zookeeper)
  # ============================================================================

  kafka:
    <<: *kafka-common
    container_name: kafka-badr
    ports:
      - "9092:9092" # internal (Spark & Docker services)
      - "9094:9094" # external (Windows host)
    environment:
      # ── KRaft Identity ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # ── Listeners ──
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # ── KRaft Cluster ID ──
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      # ── Replication (single node) ──
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # ── Performance ──
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 4

      # ── Retention ──
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 5368709120
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_LOG_CLEANUP_POLICY: delete
      KAFKA_COMPRESSION_TYPE: lz4
      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 600M
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-badr
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: badr-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - pipeline-net
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Kafka Init (create topics)
  kafka-init:
    <<: *kafka-common
    container_name: kafka-init-badr
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/topics.sh:/topics.sh
    entrypoint: ["/bin/bash", "/topics.sh"]
    restart: "no"

  # ============================================================================
  # SPARK
  # ============================================================================

  spark-master:
    <<: *spark-common
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/bitnami/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8082:8080"
      - "7077:7077"
    deploy:
      resources:
        limits:
          memory: 1G

  spark-worker:
    <<: *spark-common
    container_name: spark-worker
    command: >
      /opt/bitnami/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=1
    deploy:
      resources:
        limits:
          memory: 2G

  # ============================================================================
  # CLICKHOUSE — OLAP Data Mart
  # ============================================================================

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse-badr
    hostname: clickhouse
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./scripts/ddl:/docker-entrypoint-initdb.d
    environment:
      - CLICKHOUSE_DB=datamart_badr_interactive
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pipeline-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  # ============================================================================
  # APACHE SUPERSET — Dashboard
  # ============================================================================

  superset:
    image: apache/superset:latest
    container_name: superset-badr
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=your-secret-key-change-in-production
      - SUPERSET_LOAD_EXAMPLES=no
      - FLASK_ENV=development
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - pipeline-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

# ==============================================================================
# VOLUMES & NETWORKS
# ==============================================================================

volumes:
  postgres-db-volume:
    driver: local
  kafka-data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  superset_home:
    driver: local

networks:
  pipeline-net:
    name: pipeline-net
    driver: bridge
